name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -race ./...

      - name: Test cross-compilation
        run: |
          set -e
          for goos in linux darwin; do
            for goarch in amd64 arm64; do
              echo "Building $goos/$goarch..."
              CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build \
                -ldflags "-s -w -X main.version=test -X main.githubClientID=test -X main.githubClientSecret=test" \
                -o /tmp/tokenpile-$goos-$goarch ./cmd/tokenpile
              echo "OK: $goos/$goarch"
            done
          done

      - name: Release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TOKENPILE_GITHUB_CLIENT_ID: ${{ secrets.TOKENPILE_GITHUB_CLIENT_ID }}
          TOKENPILE_GITHUB_CLIENT_SECRET: ${{ secrets.TOKENPILE_GITHUB_CLIENT_SECRET }}
